<!DOCTYPE html>
<html>
<head>
    <title>Electricity Consumption Prediction</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">
    <h1>Plugging into the Future</h1>
    <h2>Electricity Consumption Prediction</h2>

    <form action="/predict" method="post">

        <input type="number" step="any" name="temperature" placeholder="Temperature" required>

        <input type="number" step="any" name="humidity" placeholder="Humidity" required>

        <input type="number" step="any" name="occupancy" placeholder="Occupancy" required>

        <input type="number" step="any" name="hour" placeholder="Hour" required>

        <button type="submit">Predict</button>

    </form>

    {% if prediction %}
        <h3>Predicted Electricity Consumption: {{ prediction }} kWh</h3>
    {% endif %}

</div>

</body>
</html>
